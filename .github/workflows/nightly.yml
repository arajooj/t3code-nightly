name: Nightly Build

on:
  schedule:
    # Runs every day at 04:00 UTC
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build even if no new upstream commits"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

env:
  UPSTREAM_REPO: "https://github.com/pingdotgg/t3code.git"
  UPSTREAM_BRANCH: "main"

jobs:
  check-upstream:
    name: Check for new upstream commits
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      upstream_sha: ${{ steps.check.outputs.upstream_sha }}
      upstream_sha_short: ${{ steps.check.outputs.upstream_sha_short }}
      upstream_date: ${{ steps.check.outputs.upstream_date }}
    steps:
      - name: Get upstream latest commit
        id: check
        run: |
          UPSTREAM_SHA=$(git ls-remote ${{ env.UPSTREAM_REPO }} refs/heads/${{ env.UPSTREAM_BRANCH }} | cut -f1)
          UPSTREAM_SHA_SHORT=$(echo $UPSTREAM_SHA | cut -c1-7)
          UPSTREAM_DATE=$(date -u +%Y%m%d)

          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          echo "upstream_sha_short=$UPSTREAM_SHA_SHORT" >> $GITHUB_OUTPUT
          echo "upstream_date=$UPSTREAM_DATE" >> $GITHUB_OUTPUT

          # Check if we already have a release for this commit
          EXISTING_TAG="nightly-${UPSTREAM_DATE}-${UPSTREAM_SHA_SHORT}"

          # Use GitHub API to check if tag exists
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/${EXISTING_TAG}")

          if [ "$HTTP_CODE" = "200" ] && [ "${{ inputs.force_build }}" != "true" ]; then
            echo "Tag $EXISTING_TAG already exists. Skipping build."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "New upstream commits detected or force build requested."
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build-linux:
    name: Build Linux
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Clone upstream repository
        run: |
          git clone --depth 1 --branch ${{ env.UPSTREAM_BRANCH }} ${{ env.UPSTREAM_REPO }} t3code
          cd t3code
          echo "Checked out commit: $(git rev-parse HEAD)"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        working-directory: t3code
        run: bun install --frozen-lockfile

      - name: Build project
        working-directory: t3code
        run: bun run build

      - name: Build Linux desktop app
        working-directory: t3code
        run: bun run dist:desktop:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            t3code/apps/desktop/dist-electron/*.AppImage
            t3code/apps/desktop/dist-electron/*.deb
            t3code/apps/desktop/dist-electron/*.rpm
            t3code/apps/desktop/dist-electron/*.tar.gz
            t3code/apps/desktop/dist-electron/*.snap
          if-no-files-found: warn
          retention-days: 1

  build-windows:
    name: Build Windows
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true'
    runs-on: windows-latest
    steps:
      - name: Clone upstream repository
        run: |
          git clone --depth 1 --branch ${{ env.UPSTREAM_BRANCH }} ${{ env.UPSTREAM_REPO }} t3code
          cd t3code
          echo "Checked out commit: $(git rev-parse HEAD)"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        working-directory: t3code
        run: bun install --frozen-lockfile

      - name: Build project
        working-directory: t3code
        run: bun run build

      - name: Build Windows desktop app
        working-directory: t3code
        run: bun run dist:desktop:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            t3code/apps/desktop/dist-electron/*.exe
            t3code/apps/desktop/dist-electron/*.msi
          if-no-files-found: warn
          retention-days: 1

  build-macos:
    name: Build macOS
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true'
    runs-on: macos-latest
    steps:
      - name: Clone upstream repository
        run: |
          git clone --depth 1 --branch ${{ env.UPSTREAM_BRANCH }} ${{ env.UPSTREAM_REPO }} t3code
          cd t3code
          echo "Checked out commit: $(git rev-parse HEAD)"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        working-directory: t3code
        run: bun install --frozen-lockfile

      - name: Build project
        working-directory: t3code
        run: bun run build

      - name: Build macOS desktop app (arm64)
        working-directory: t3code
        run: bun run dist:desktop:dmg:arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS desktop app (x64)
        working-directory: t3code
        run: bun run dist:desktop:dmg:x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            t3code/apps/desktop/dist-electron/*.dmg
            t3code/apps/desktop/dist-electron/*.zip
          if-no-files-found: warn
          retention-days: 1

  release:
    name: Create Nightly Release
    needs: [check-upstream, build-linux, build-windows, build-macos]
    if: always() && needs.check-upstream.outputs.should_build == 'true' && (needs.build-linux.result == 'success' || needs.build-windows.result == 'success' || needs.build-macos.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f | sort
          echo "==========================="

      - name: Determine build status
        id: status
        run: |
          STATUS=""
          if [ "${{ needs.build-linux.result }}" = "success" ]; then
            STATUS="${STATUS} Linux"
          fi
          if [ "${{ needs.build-windows.result }}" = "success" ]; then
            STATUS="${STATUS} Windows"
          fi
          if [ "${{ needs.build-macos.result }}" = "success" ]; then
            STATUS="${STATUS} macOS"
          fi
          echo "platforms=$STATUS" >> $GITHUB_OUTPUT

          FAILED=""
          if [ "${{ needs.build-linux.result }}" != "success" ]; then
            FAILED="${FAILED} Linux"
          fi
          if [ "${{ needs.build-windows.result }}" != "success" ]; then
            FAILED="${FAILED} Windows"
          fi
          if [ "${{ needs.build-macos.result }}" != "success" ]; then
            FAILED="${FAILED} macOS"
          fi
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "nightly-${{ needs.check-upstream.outputs.upstream_date }}-${{ needs.check-upstream.outputs.upstream_sha_short }}"
          name: "Nightly Build ${{ needs.check-upstream.outputs.upstream_date }}"
          prerelease: true
          body: |
            ## T3 Code - Nightly Build

            **Automated nightly build from upstream [pingdotgg/t3code](https://github.com/pingdotgg/t3code)**

            - **Date:** ${{ needs.check-upstream.outputs.upstream_date }}
            - **Upstream commit:** [`${{ needs.check-upstream.outputs.upstream_sha_short }}`](https://github.com/pingdotgg/t3code/commit/${{ needs.check-upstream.outputs.upstream_sha }})
            - **Successful builds:**${{ steps.status.outputs.platforms }}
            ${{ steps.status.outputs.failed != '' && format('- **Failed builds:**{0}', steps.status.outputs.failed) || '' }}

            ---

            > **Warning:** These are automated, unsigned nightly builds. They may be unstable and are NOT officially supported by the T3 Code team.
            > Use at your own risk.

            ---

            ### License

            T3 Code is licensed under the [MIT License](https://github.com/pingdotgg/t3code/blob/main/LICENSE).
            Copyright (c) 2026 T3 Tools Inc.

            This nightly build is an unofficial redistribution. All credit goes to the original authors at [pingdotgg/t3code](https://github.com/pingdotgg/t3code).
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    name: Cleanup old nightly releases
    needs: release
    if: needs.release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Delete old nightly releases (keep last 7)
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 7
          delete_tag_pattern: "nightly-"
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
